events {
    worker_connections 1024;
}

http {
    # ─── Security ───────────────────────────────────────────────────
    server_tokens off;

    add_header X-Frame-Options          "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options   "nosniff"                          always;
    add_header X-XSS-Protection         "1; mode=block"                    always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    # HSTS only when the upstream is reached over HTTPS; the directive is
    # idempotent on plain HTTP and harmless behind a TLS-terminating LB.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ─── Rate limiting ──────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m  rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/s;

    # ─── Timeouts ──────────────────────────────────────────────────
    proxy_connect_timeout   10s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;
    send_timeout            60s;

    # ─── Body size (DoS protection) ────────────────────────────────
    client_max_body_size    5m;
    client_body_timeout     15s;

    # ─── Gzip ───────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-www-form-urlencoded;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Request-ID propagation ────────────────────────────────────
    map $http_x_request_id $request_id_final {
        default $http_x_request_id;
        ""      $request_id;
    }

    # ─── HTTP → HTTPS redirect ─────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_prefer_server_ciphers on;

        # ─── Custom error pages ────────────────────────────────────
        error_page 502 503 504 /50x.html;
        error_page 404         /404.html;

        location = /50x.html {
            root /usr/share/nginx/html/errors;
            internal;
        }
        location = /404.html {
            root /usr/share/nginx/html/errors;
            internal;
        }

        # ─── Internal subrequest used by auth_request ──────────────
        # NGINX consults this location to decide whether the user is
        # authenticated; downstream services still re-verify the JWT.
        location = /__auth_verify {
            internal;
            proxy_pass http://auth-service:8000/internal/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Request-ID  $request_id_final;
        }

        # ─── Frontend ──────────────────────────────────────────────
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id_final;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ─── Auth — public endpoints (login/register) ──────────────
        # No auth_request here; clients must be able to reach login.
        location ~ ^/api/v1/auth/(login|register|health)$ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://auth-service:8000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id_final;
        }

        # ─── Auth — protected endpoints (me, users, role) ──────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            auth_request /__auth_verify;

            auth_request_set $auth_user_id   $upstream_http_x_user_id;
            auth_request_set $auth_username  $upstream_http_x_user_username;
            auth_request_set $auth_user_role $upstream_http_x_user_role;

            proxy_pass http://auth-service:8000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id_final;
            proxy_set_header X-User-Id         $auth_user_id;
            proxy_set_header X-User-Username   $auth_username;
            proxy_set_header X-User-Role       $auth_user_role;
        }

        # ─── Generic protected API blocks ──────────────────────────
        # All require a valid JWT (auth_request) AND propagate identity
        # headers; downstream services still verify the token themselves.

        location /api/v1/projects/ {
            limit_req zone=api burst=20 nodelay;
            auth_request /__auth_verify;
            auth_request_set $auth_user_id   $upstream_http_x_user_id;
            auth_request_set $auth_username  $upstream_http_x_user_username;
            auth_request_set $auth_user_role $upstream_http_x_user_role;

            proxy_pass http://project-service:8000/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID      $request_id_final;
            proxy_set_header X-User-Id         $auth_user_id;
            proxy_set_header X-User-Username   $auth_username;
            proxy_set_header X-User-Role       $auth_user_role;
            proxy_set_header Authorization     $http_authorization;
        }

        location /api/v1/financial/ {
            limit_req zone=api burst=20 nodelay;
            auth_request /__auth_verify;
            auth_request_set $auth_user_id   $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_pass http://financial-service:8000/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID      $request_id_final;
            proxy_set_header X-User-Id         $auth_user_id;
            proxy_set_header X-User-Role       $auth_user_role;
            proxy_set_header Authorization     $http_authorization;
        }

        location /api/v1/eco/ {
            limit_req zone=api burst=20 nodelay;
            auth_request /__auth_verify;
            auth_request_set $auth_user_id   $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_pass http://eco-impact-service:8000/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID      $request_id_final;
            proxy_set_header X-User-Id         $auth_user_id;
            proxy_set_header X-User-Role       $auth_user_role;
            proxy_set_header Authorization     $http_authorization;
        }

        location /api/v1/multicriteria/ {
            limit_req zone=api burst=20 nodelay;
            auth_request /__auth_verify;
            auth_request_set $auth_user_id   $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_pass http://multi-criteria-service:8000/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID      $request_id_final;
            proxy_set_header X-User-Id         $auth_user_id;
            proxy_set_header X-User-Role       $auth_user_role;
            proxy_set_header Authorization     $http_authorization;
        }

        location /api/v1/scenario/ {
            limit_req zone=api burst=20 nodelay;
            auth_request /__auth_verify;
            auth_request_set $auth_user_id   $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_pass http://scenario-service:8000/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID      $request_id_final;
            proxy_set_header X-User-Id         $auth_user_id;
            proxy_set_header X-User-Role       $auth_user_role;
            proxy_set_header Authorization     $http_authorization;
        }

        location /api/v1/comparison/ {
            limit_req zone=api burst=20 nodelay;
            auth_request /__auth_verify;
            auth_request_set $auth_user_id   $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_pass http://comparison-service:8000/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID      $request_id_final;
            proxy_set_header X-User-Id         $auth_user_id;
            proxy_set_header X-User-Role       $auth_user_role;
            proxy_set_header Authorization     $http_authorization;
        }

        location /api/v1/reports/ {
            limit_req zone=api burst=10 nodelay;
            auth_request /__auth_verify;
            auth_request_set $auth_user_id   $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_pass http://report-service:8000/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID      $request_id_final;
            proxy_set_header X-User-Id         $auth_user_id;
            proxy_set_header X-User-Role       $auth_user_role;
            proxy_set_header Authorization     $http_authorization;
            proxy_read_timeout 120s;
            client_max_body_size 10m;
        }
    }
}
