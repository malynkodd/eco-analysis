events {
    worker_connections 1024;
}

http {
    # ─── Безпека ───────────────────────────────────────────────────
    server_tokens off;

    add_header X-Frame-Options          "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header X-XSS-Protection         "1; mode=block"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;

    # ─── Rate limiting ──────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m  rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/s;

    # ─── Таймаути ──────────────────────────────────────────────────
    proxy_connect_timeout   10s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;
    send_timeout            60s;

    # ─── Розмір тіла запиту (захист від DoS) ───────────────────────
    client_max_body_size    5m;
    client_body_timeout     15s;

    # ─── Gzip стиснення ────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-www-form-urlencoded;

    # ─── Включаємо MIME типи ────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;

        # ── TODO: SSL (HTTPS) ────────────────────────────────────────
        # Для продакшну замініть на HTTPS-конфігурацію:
        #
        # listen 443 ssl;
        # ssl_certificate      /etc/nginx/ssl/cert.pem;
        # ssl_certificate_key  /etc/nginx/ssl/key.pem;
        # ssl_protocols        TLSv1.2 TLSv1.3;
        # ssl_ciphers          HIGH:!aNULL:!MD5;
        # ssl_session_cache    shared:SSL:10m;
        # ssl_session_timeout  10m;
        #
        # HTTP → HTTPS редірект:
        # server {
        #     listen 80;
        #     return 301 https://$host$request_uri;
        # }
        # ────────────────────────────────────────────────────────────

        # ─── Кастомні сторінки помилок ───────────────────────────────
        error_page 502 503 504 /50x.html;
        error_page 404         /404.html;

        location = /50x.html {
            root /usr/share/nginx/html/errors;
            internal;
        }
        location = /404.html {
            root /usr/share/nginx/html/errors;
            internal;
        }

        # Frontend
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Auth — строгий ліміт (захист від brute-force)
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://auth-service:8000/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Projects API
        location /api/projects/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://project-service:8000/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Financial API
        location /api/financial/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://financial-service:8000/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Eco Impact API
        location /api/eco/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://eco-impact-service:8000/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Multi-Criteria API
        location /api/multicriteria/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://multi-criteria-service:8000/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Scenario API
        location /api/scenario/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://scenario-service:8000/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Comparison API
        location /api/comparison/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://comparison-service:8000/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Reports API (генерація PDF — більший таймаут і розмір)
        location /api/reports/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://report-service:8000/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;   # PDF може генеруватись довше
            client_max_body_size 10m;  # PDF файли можуть бути великими
        }
    }
}
