  nginx:
    image: nginx:alpine
    container_name: eco_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/errors:/usr/share/nginx/html/errors:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
