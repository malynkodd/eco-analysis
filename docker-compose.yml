      auth-service:
        condition: service_healthy
      project-service:
        condition: service_healthy
      financial-service:
        condition: service_healthy
      eco-impact-service:
        condition: service_healthy
      multi-criteria-service:
        condition: service_healthy
      scenario-service:
        condition: service_healthy
      comparison-service:
        condition: service_healthy
      report-service:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - eco_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  eco_network:
    driver: bridge
