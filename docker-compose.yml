services:

  postgres:
    image: postgres:15
    container_name: eco_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eco_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecouser} -d ${POSTGRES_DB:-ecodb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./services/auth-service
    container_name: eco_auth
    env_file:
      - .env
    environment:
      ENVIRONMENT:           ${ENVIRONMENT}
      WORKERS:               ${WORKERS}
      DATABASE_URL:          ${DATABASE_URL}
      JWT_PRIVATE_KEY_PATH:  ${JWT_PRIVATE_KEY_PATH}
      JWT_PUBLIC_KEY_PATH:   ${JWT_PUBLIC_KEY_PATH}
      JWT_ISSUER:            ${JWT_ISSUER}
      JWT_AUDIENCE:          ${JWT_AUDIENCE}
      JWT_EXPIRE_MINUTES:    ${JWT_EXPIRE_MINUTES}
      ADMIN_USERNAME:        ${ADMIN_USERNAME}
      ADMIN_PASSWORD:        ${ADMIN_PASSWORD}
      ADMIN_EMAIL:           ${ADMIN_EMAIL}
      CORS_ALLOWED_ORIGINS:  ${CORS_ALLOWED_ORIGINS}
    volumes:
      - ./keys:/run/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eco_network

  project-service:
    build: ./services/project-service
    container_name: eco_project
    env_file:
      - .env
    environment:
      ENVIRONMENT:          ${ENVIRONMENT}
      WORKERS:              ${WORKERS}
      DATABASE_URL:         ${DATABASE_URL}
      JWT_PUBLIC_KEY_PATH:  ${JWT_PUBLIC_KEY_PATH}
      JWT_ISSUER:           ${JWT_ISSUER}
      JWT_AUDIENCE:         ${JWT_AUDIENCE}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    volumes:
      - ./keys/jwt_public.pem:/run/keys/jwt_public.pem:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eco_network

  financial-service:
    build: ./services/financial-service
    container_name: eco_financial
    env_file:
      - .env
    environment:
      ENVIRONMENT:          ${ENVIRONMENT}
      WORKERS:              ${WORKERS}
      JWT_PUBLIC_KEY_PATH:  ${JWT_PUBLIC_KEY_PATH}
      JWT_ISSUER:           ${JWT_ISSUER}
      JWT_AUDIENCE:         ${JWT_AUDIENCE}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    volumes:
      - ./keys/jwt_public.pem:/run/keys/jwt_public.pem:ro
    networks:
      - eco_network

  eco-impact-service:
    build: ./services/eco-impact-service
    container_name: eco_impact
    env_file:
      - .env
    environment:
      ENVIRONMENT:          ${ENVIRONMENT}
      WORKERS:              ${WORKERS}
      JWT_PUBLIC_KEY_PATH:  ${JWT_PUBLIC_KEY_PATH}
      JWT_ISSUER:           ${JWT_ISSUER}
      JWT_AUDIENCE:         ${JWT_AUDIENCE}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    volumes:
      - ./keys/jwt_public.pem:/run/keys/jwt_public.pem:ro
    networks:
      - eco_network

  multi-criteria-service:
    build: ./services/multi-criteria-service
    container_name: eco_multicriteria
    env_file:
      - .env
    environment:
      ENVIRONMENT:          ${ENVIRONMENT}
      WORKERS:              ${WORKERS}
      JWT_PUBLIC_KEY_PATH:  ${JWT_PUBLIC_KEY_PATH}
      JWT_ISSUER:           ${JWT_ISSUER}
      JWT_AUDIENCE:         ${JWT_AUDIENCE}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    volumes:
      - ./keys/jwt_public.pem:/run/keys/jwt_public.pem:ro
    networks:
      - eco_network

  scenario-service:
    build: ./services/scenario-service
    container_name: eco_scenario
    env_file:
      - .env
    environment:
      ENVIRONMENT:          ${ENVIRONMENT}
      WORKERS:              ${WORKERS}
      JWT_PUBLIC_KEY_PATH:  ${JWT_PUBLIC_KEY_PATH}
      JWT_ISSUER:           ${JWT_ISSUER}
      JWT_AUDIENCE:         ${JWT_AUDIENCE}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    volumes:
      - ./keys/jwt_public.pem:/run/keys/jwt_public.pem:ro
    networks:
      - eco_network

  comparison-service:
    build: ./services/comparison-service
    container_name: eco_comparison
    env_file:
      - .env
    environment:
      ENVIRONMENT:          ${ENVIRONMENT}
      WORKERS:              ${WORKERS}
      JWT_PUBLIC_KEY_PATH:  ${JWT_PUBLIC_KEY_PATH}
      JWT_ISSUER:           ${JWT_ISSUER}
      JWT_AUDIENCE:         ${JWT_AUDIENCE}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    volumes:
      - ./keys/jwt_public.pem:/run/keys/jwt_public.pem:ro
    networks:
      - eco_network

  report-service:
    build: ./services/report-service
    container_name: eco_report
    env_file:
      - .env
    environment:
      ENVIRONMENT:          ${ENVIRONMENT}
      WORKERS:              ${WORKERS}
      JWT_PUBLIC_KEY_PATH:  ${JWT_PUBLIC_KEY_PATH}
      JWT_ISSUER:           ${JWT_ISSUER}
      JWT_AUDIENCE:         ${JWT_AUDIENCE}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    volumes:
      - ./keys/jwt_public.pem:/run/keys/jwt_public.pem:ro
    networks:
      - eco_network

  frontend:
    build: ./frontend
    container_name: eco_frontend
    networks:
      - eco_network

  nginx:
    image: nginx:alpine
    container_name: eco_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/errors:/usr/share/nginx/html/errors:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - auth-service
      - project-service
      - financial-service
      - eco-impact-service
      - multi-criteria-service
      - scenario-service
      - comparison-service
      - report-service
      - frontend
    networks:
      - eco_network

volumes:
  postgres_data:

networks:
  eco_network:
    driver: bridge
