services:

  postgres:
    image: postgres:15
    container_name: eco_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eco_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecouser} -d ${POSTGRES_DB:-ecodb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrations:
    build:
      context: .
      dockerfile: db/Dockerfile.migrations
    container_name: eco_migrations
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eco_network
    restart: "no"

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: eco_auth
    env_file:
      - .env
    environment:
      ENVIRONMENT:           ${ENVIRONMENT}
      WORKERS:               ${WORKERS}
      DATABASE_URL:          ${DATABASE_URL}
      JWT_PRIVATE_KEY_PATH:  ${JWT_PRIVATE_KEY_PATH}
      JWT_PUBLIC_KEY_PATH:   ${JWT_PUBLIC_KEY_PATH}
      JWT_ISSUER:            ${JWT_ISSUER}
      JWT_AUDIENCE:          ${JWT_AUDIENCE}
      JWT_EXPIRE_MINUTES:    ${JWT_EXPIRE_MINUTES}
      ADMIN_USERNAME:        ${ADMIN_USERNAME}
      ADMIN_PASSWORD:        ${ADMIN_PASSWORD}
      ADMIN_EMAIL:           ${ADMIN_EMAIL}
      CORS_ALLOWED_ORIGINS:  ${CORS_ALLOWED_ORIGINS}
    volumes:
      - ./keys:/run/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    networks:
      - eco_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  project-service:
    build:
      context: .
      dockerfile: services/project-service/Dockerfile
